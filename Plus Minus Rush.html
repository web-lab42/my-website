<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plus Minus Rush</title>

<style>
:root {
  --main-bg: #ffffff;
  --correct-bg: #d4edda;
  --wrong-bg: #f8d7da;
}

body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  text-align: center;
  margin: 0;
  padding: 20px;
  transition: background-color 0.3s;
  background-color: var(--main-bg);
  overflow: hidden;
}

h1 { font-size: 24px; color: #333; margin-bottom: 5px; }
#level-display { font-size: 18px; color: #666; margin-bottom: 15px; }

/* タイムバー */
#timer-container {
  width: 100%;
  max-width: 400 *px*;
  height: 10px;
  background: #eee;
  margin: 10px auto;
  border-radius: 5px;
  overflow: hidden;
}
#timer-bar {
  width: 100%;
  height: 100%;
  background: #007bff;
  transition: width 0.1s linear;
}

#question {
  font-size: 56px;
  font-weight: bold;
  margin: 30px 0;
  min-height: 80px;
}

#choices {
  display: grid;
  grid-template-columns: repeat(1, 1fr);
  gap: 12px;
  max-width: 400px;
  margin: 0 auto;
}

.choice {
  font-size: 28px;
  padding: 15px;
  border: 2px solid #ddd;
  border-radius: 12px;
  background: white;
  cursor: pointer;
  transition: transform 0.1s, background 0.2s;
}

.choice:active { transform: scale(0.95); }

#info {
  margin-top: 30px;
  display: flex;
  justify-content: center;
  gap: 40px;
  font-size: 20px;
}

#combo-display {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 80px;
  font-weight: bold;
  color: rgba(255, 193, 7, 0.3);
  pointer-events: none;
  z-index: -1;
}

.flash-correct { background-color: var(--correct-bg) !important; }
.flash-wrong { background-color: var(--wrong-bg) !important; }
</style>
</head>

<body>

<h1>Plus Minus Rush</h1>
<div id="level-display">称号: 駆け出し</div>

<div id="timer-container">
  <div id="timer-bar"></div>
</div>

<div id="combo-display"></div>
<div id="question"></div>
<div id="choices"></div>

<div id="info">
  <div>Score: <span id="score">0</span></div>
  <div>Best: <span id="best">0</span></div>
</div>

<script>
let score = 0;
let combo = 0;
let bestScore = localStorage.getItem('math_best') || 0;
let timeLimit = 10.0;
let remainingTime = 10.0;
let timer;
let correctAnswer;

document.getElementById("best").textContent = bestScore;

function formatNumber(n) {
  return n < 0 ? `(−${Math.abs(n)})` : n;
}

function randInt() {
  return Math.floor(Math.random() * 19) - 9; // -9 to 9
}

function updateTitle() {
  const titles = [
    { s: 0, t: "駆け出し" },
    { s: 14, t: "計算の見習い" },
    { s: 24, t: "マイナスの使い手" },
    { s: 32, t: "数式の魔術師" },
    { s: 45, t: "正負の支配者" },
    { s: 58, t: "数神" }
  ];
  const title = titles.reverse().find(x => score >= x.s);
  document.getElementById("level-display").textContent = `称号: ${title.t}`;
}

function generateQuestion() {
  let a, b, op;
  const ops = ["+", "-", "*", "/"];

  while (true) {
    a = randInt();
    b = randInt();
    op = ops[Math.floor(Math.random() * ops.length)];
    if (op === "/") {
      if (b === 0 || a % b !== 0) continue;
    }
    break;
  }

  correctAnswer = eval(`${a} ${op} ${b}`);
  let displayOp = op === "*" ? "×" : (op === "/" ? "÷" : op);
  document.getElementById("question").textContent = `${formatNumber(a)} ${displayOp} ${formatNumber(b)}`;

  generateChoices(correctAnswer);
}

function generateChoices(answer) {
  let choices = new Set([answer]);
  while (choices.size < 3) {
    let dummy = answer + (Math.floor(Math.random() * 11) - 5);
    if (dummy !== answer) choices.add(dummy);
  }

  const container = document.getElementById("choices");
  container.innerHTML = "";
  Array.from(choices).sort(() => Math.random() - 0.5).forEach(val => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = formatNumber(val);
    btn.onclick = () => checkAnswer(val);
    container.appendChild(btn);
  });
}

function startTimer() {
  remainingTime = timeLimit;
  clearInterval(timer);
  timer = setInterval(() => {
    remainingTime -= 0.05;
    const percent = (remainingTime / timeLimit) * 100;
    document.getElementById("timer-bar").style.width = percent + "%";

    if (remainingTime <= 0) gameOver("時間切れ！");
  }, 50);
}

function checkAnswer(selected) {
  if (selected === correctAnswer) {
    score++;
    combo++;
    document.body.classList.add('flash-correct');
    setTimeout(() => document.body.classList.remove('flash-correct'), 200);

    // コンボ表示
    if (combo > 1) {
      const cb = document.getElementById("combo-display");
      cb.textContent = `${combo} Combo!`;
      setTimeout(() => { if(combo > 1) cb.textContent = ""; }, 800);
    }

    document.getElementById("score").textContent = score;
    timeLimit = Math.max(2.0, timeLimit * 0.96); // 徐々に速く（最低2秒）
    updateTitle();
    next();
  } else {
    gameOver("不正解！");
  }
}

function next() {
  generateQuestion();
  startTimer();
}

// スコアに応じた称号文字列を返すヘルパー関数
function getTitleText() {
  const titles = [
    { s: 0, t: "駆け出し" },
    { s: 14, t: "計算の見習い" },
    { s: 24, t: "マイナスの使い手" },
    { s: 32, t: "数式の魔術師" },
    { s: 45, t: "正負の支配者" },
    { s: 58, t: "数神" }
  ];
  return titles.reverse().find(x => score >= x.s).t;
}

function gameOver(msg) {
  clearInterval(timer);
  document.body.classList.add('flash-wrong');
  
  const currentTitle = getTitleText();

  if (score > bestScore) {
    localStorage.setItem('math_best', score);
    msg += "\n★自己ベスト更新！★";
  }

  // 最大コンボを削除し、獲得称号を表示
  alert(`${msg}\nスコア: ${score}\n獲得称号: ${currentTitle}`);
  location.reload();
}

// 初期化
generateQuestion();
startTimer();
</script>

</body>
</html>
