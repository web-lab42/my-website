<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piactone - Real Responsive</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #252525;
            --accent: #00e5ff;
            --active-gradient: linear-gradient(to bottom, #fff 0%, var(--accent) 100%);
            --black-active: linear-gradient(to bottom, #333 0%, var(--accent) 100%);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
        }

        header {
            padding: 10px 20px;
            background: var(--panel);
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 100;
        }

        .control-item { display: flex; flex-direction: column; gap: 4px; }
        .label { font-size: 10px; color: var(--accent); font-weight: bold; }
        
        button {
            background: #444; border: none; color: white; padding: 6px 14px;
            border-radius: 4px; cursor: pointer;
        }
        button.active { background: var(--accent); color: #000; }

        .piano-rack {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 10px 0;
            background: #000;
        }

        .deck-container {
            flex: 1;
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
            /* タッチスクロールを有効にし、かつタップ反応を遅延させない */
            touch-action: pan-x; 
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .deck-container::-webkit-scrollbar { display: none; }

        .piano-strip {
            display: flex;
            height: 100%;
            width: fit-content;
            padding: 0 40px;
            /* 内部のイベントがスクロールを邪魔しないようにする */
            pointer-events: auto;
        }

        .key {
            position: relative;
            border: 1px solid #bbb;
            border-radius: 0 0 6px 6px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 12px;
            box-sizing: border-box;
            /* 鍵盤上での垂直スクロール（誤動作）を防ぐが、横は生かす */
            touch-action: pan-x;
        }

        .white-key { width: 60px; height: 100%; background: #eee; z-index: 1; }
        .black-key { 
            width: 36px; height: 60%; background: #000; 
            margin-left: -18px; margin-right: -18px; z-index: 2; 
        }

        .key.active { background: var(--active-gradient) !important; }
        .black-key.active { background: var(--black-active) !important; }

        .key-label { pointer-events: none; font-size: 13px; color: #888; margin-bottom: 4px; }

        .assign-btn {
            position: absolute; top: 6px; font-size: 10px;
            background: rgba(0,0,0,0.2); color: #888;
            padding: 4px 8px; border-radius: 4px;
            opacity: 0; transition: opacity 0.2s;
        }
        .key:hover .assign-btn { opacity: 1; }

        #modal {
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: var(--panel); 
            padding: 30px; border-radius: 12px; z-index: 200; 
            border: 2px solid var(--accent); text-align: center;
        }

        @media (max-width: 768px) {
            .white-key { width: 54px; }
            .black-key { width: 32px; margin-left: -16px; margin-right: -16px; }
        }
    </style>
</head>
<body>

<header>
    <div class="control-item">
        <span class="label">Volume</span>
        <input type="range" id="vol" min="0" max="1" step="0.05" value="0.4">
    </div>
    <div class="control-item">
        <span class="label">Sustain</span>
        <button id="susToggle">OFF</button>
    </div>
</header>

<div class="piano-rack">
    <div class="deck-container" id="deck-upper">
        <div class="piano-strip" id="strip-upper"></div>
    </div>
    <div class="deck-container" id="deck-lower">
        <div class="piano-strip" id="strip-lower"></div>
    </div>
</div>

<div id="modal">
    <p>Press a PC key to bind for<br><strong id="target-note" style="color:var(--accent);"></strong></p>
    <button onclick="closeModal()">Cancel</button>
</div>

<script>
    const NOTES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const activeNodes = new Map();
    let sustain = false;
    let volume = 0.4;
    
    const DEFAULT_MAP = {
        '36':'z', '37':'s', '38':'x', '39':'d', '40':'c', '41':'v', '42':'g', '43':'b', '44':'h', '45':'n', '46':'j', '47':'m', '48':',',
        '60':'a', '61':'w', '62':'s', '63':'e', '64':'d', '65':'f', '66':'t', '67':'g', '68':'y', '69':'h', '70':'u', '71':'j', '72':'k', '73':'o', '74':'l'
    };
    let keyMap = JSON.parse(localStorage.getItem('piano_bindings')) || DEFAULT_MAP;

    function playNote(midi) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (activeNodes.has(midi)) return;
        const freq = 440 * Math.pow(2, (midi - 69) / 12);
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.005);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        activeNodes.set(midi, { osc, gainNode });
        visualizeKey(midi, true);
    }

    function stopNote(midi) {
        const node = activeNodes.get(midi);
        if (node) {
            const release = sustain ? 1.2 : 0.08;
            const now = audioCtx.currentTime;
            node.gainNode.gain.cancelScheduledValues(now);
            node.gainNode.gain.setValueAtTime(node.gainNode.gain.value, now);
            node.gainNode.gain.exponentialRampToValueAtTime(0.001, now + release);
            const targetOsc = node.osc;
            setTimeout(() => { try { targetOsc.stop(); targetOsc.disconnect(); } catch(e){} }, release * 1000);
            activeNodes.delete(midi);
            visualizeKey(midi, false);
        }
    }

    function createDeck(stripId, startMidi, count) {
        const strip = document.getElementById(stripId);
        for (let i = 0; i < count; i++) {
            const midi = startMidi + i;
            const isBlack = NOTES[midi % 12].includes('#');
            const key = document.createElement('div');
            key.className = `key ${isBlack ? 'black-key' : 'white-key'}`;
            key.dataset.midi = midi;

            const label = document.createElement('div');
            label.className = 'key-label';
            key.appendChild(label);

            const assignBtn = document.createElement('div');
            assignBtn.className = 'assign-btn';
            assignBtn.textContent = 'Bind';
            assignBtn.onpointerdown = (e) => { e.stopPropagation(); openModal(midi); };
            key.appendChild(assignBtn);

            // 演奏イベント（スクロールを阻害しない最小限の構成）
            key.addEventListener('pointerdown', (e) => {
                if(e.target.classList.contains('assign-btn')) return;
                // マウス左クリック以外は無視
                if (e.pointerType === 'mouse' && e.button !== 0) return;
                
                playNote(midi);

                // 離鍵判定
                const upHandler = () => {
                    stopNote(midi);
                    window.removeEventListener('pointerup', upHandler);
                    window.removeEventListener('pointercancel', upHandler);
                };
                window.addEventListener('pointerup', upHandler);
                window.addEventListener('pointercancel', upHandler);
            });

            strip.appendChild(key);
        }
    }

    function visualizeKey(midi, active) {
        document.querySelectorAll(`.key[data-midi="${midi}"]`).forEach(k => k.classList.toggle('active', active));
    }

    function updateLabels() {
        document.querySelectorAll('.key').forEach(k => {
            const midi = k.dataset.midi;
            k.querySelector('.key-label').textContent = keyMap[midi] ? keyMap[midi].toUpperCase() : '';
        });
    }

    let bindingTarget = null;
    function openModal(midi) {
        bindingTarget = midi;
        document.getElementById('target-note').textContent = `${NOTES[midi%12]}${Math.floor(midi/12)-1}`;
        document.getElementById('modal').style.display = 'block';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; bindingTarget = null; }

    window.addEventListener('keydown', (e) => {
        if (e.repeat) return;
        if (bindingTarget !== null) {
            keyMap[bindingTarget] = e.key.toLowerCase();
            localStorage.setItem('piano_bindings', JSON.stringify(keyMap));
            updateLabels(); closeModal(); return;
        }
        for (let midi in keyMap) { if (keyMap[midi] === e.key.toLowerCase()) playNote(parseInt(midi)); }
    });
    window.addEventListener('keyup', (e) => {
        for (let midi in keyMap) { if (keyMap[midi] === e.key.toLowerCase()) stopNote(parseInt(midi)); }
    });

    document.getElementById('vol').oninput = (e) => volume = parseFloat(e.target.value);
    document.getElementById('susToggle').onclick = (e) => {
        sustain = !sustain; e.target.classList.toggle('active', sustain);
        e.target.textContent = sustain ? 'ON' : 'OFF';
    };

    createDeck('strip-upper', 60, 37);
    createDeck('strip-lower', 36, 37);
    updateLabels();
</script>
</body>
</html>
